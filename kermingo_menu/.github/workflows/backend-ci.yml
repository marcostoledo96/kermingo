name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (with MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root-test-pw
          MYSQL_DATABASE: kermingo_test
          MYSQL_USER: kermingo
          MYSQL_PASSWORD: kermingo-test-pw
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ukermingo -pkermingo-test-pw"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: kermingo
      DB_PASSWORD: kermingo-test-pw
      DB_NAME: kermingo_test
      JWT_SECRET: test-secret
      FRONTEND_URL: http://localhost:3000
      GOOGLE_DRIVE_FOLDER_ID: dummy
      GOOGLE_OAUTH_CLIENT_ID: dummy
      GOOGLE_OAUTH_CLIENT_SECRET: dummy
      GOOGLE_OAUTH_REFRESH_TOKEN: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Wait for MySQL to be ready
        run: sleep 5

      - name: Test
        working-directory: backend
        # Run jest directly to avoid the shim bug in the npm-installed bin
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --runInBand
